name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias voice-diary \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Voice Diary, OU=Dev, O=Voice Diary, L=Beijing, S=Beijing, C=CN"

      - name: Expo prebuild (Android)
        run: npx expo prebuild -p android --clean

      - name: Configure release signing
        run: |
          # Add release signing properties to gradle.properties
          cat >> android/gradle.properties << 'EOF'
          RELEASE_KEYSTORE=../release.keystore
          RELEASE_STORE_PASSWORD=android
          RELEASE_KEY_ALIAS=voice-diary
          RELEASE_KEY_PASSWORD=android
          EOF
          # Patch app/build.gradle to add release signing config
          python3 scripts/patch-release-signing.py android/app/build.gradle

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: voice-diary-apk
          path: android/app/build/outputs/apk/release/*.apk
